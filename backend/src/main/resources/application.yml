spring:
  config:
    import:
      - classpath:db-credentials.yml   # username, password만 불러옴
      - classpath:file-path.yml
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis:
  mapper-locations: classpath*:mappers/**/*.xml
  type-aliases-package: com.Devim.backend.domain
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

logging:
  level:
    com.Devim: debug
    org:
      springframework:
        test:
          context:
            transaction: trace
        jdbc:
          core: debug
